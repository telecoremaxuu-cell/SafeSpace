<!DOCTYPE html>
<html lang='ru'>
<head>
    <meta charset='UTF-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='https://cdn.tailwindcss.com'></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { 
            background: linear-gradient(180deg, #1A1C22 0%, #121420 100%); 
            overflow: hidden; 
            font-family: -apple-system, system-ui, sans-serif;
        }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .animate__animated { animation-duration: 0.4s !important; animation-timing-function: ease-in-out !important; }
        .pulse { animation: pulse-green 2s infinite; }
        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
    </style>
</head>
<body class='p-5 text-[#E0E0E0] font-sans h-screen flex flex-col leading-relaxed'>
    
    <div id='m' class="animate__animated animate__fadeIn">
        <div class="flex flex-col items-center mb-10 mt-5">
            <h1 id="user-name" class='text-2xl font-light tracking-widest text-[#8E8E93] uppercase'>SAFESPACE</h1>
            <div id="status-container" class="flex items-center mt-2 space-x-2">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-red-500"></div>
                <span id="status-text" class="text-[10px] uppercase tracking-tighter text-[#8E8E93] font-bold">Offline</span>
            </div>
        </div>

        <div class="mt-8 px-4 w-full animate__animated animate__fadeInUp" style="animation-delay: 0.5s">
            <div class="flex justify-between items-end mb-2">
                <span id="progress-text" class="text-[10px] uppercase tracking-widest text-[#8E8E93] font-bold">Загрузка пути...</span>
                <span id="progress-percent" class="text-xs font-light text-indigo-400">0%</span>
            </div>
            <div class="w-full h-1 bg-white/5 rounded-full overflow-hidden border border-white/5">
                <div id="progress-fill" class="h-full bg-gradient-to-r from-indigo-400 to-emerald-400 transition-all duration-1000 ease-out" style="width: 0%"></div>
            </div>
        </div>

        <div class="space-y-5">
            <button onclick='showScreen("sos")' class='w-full glass p-6 rounded-[2rem] flex justify-between items-center active:scale-95 transition-all'>
                <span>🔥 SOS: Выплеснуть</span><span>→</span>
            </button>
            <button onclick='showScreen("chat")' class='w-full glass p-6 rounded-[2rem] flex justify-between items-center active:scale-95 transition-all'>
                <span>💬 Общий чат</span><span>→</span>
            </button>
            <button onclick='showScreen("path")' class='w-full glass p-6 rounded-[2rem] flex justify-between items-center active:scale-95 transition-all'>
                <span>🏔️ Путь 21 дня</span><span>→</span>
            </button>
            <button onclick='showScreen("private_chat")' class='w-full glass p-6 rounded-[2rem] flex justify-between items-center active:scale-95 transition-all'>
                <span>🎭 Случайный диалог</span><span>→</span>
            </button>
        </div>
    </div>

    <div id='s' style='display:none' class="flex flex-col h-full animate__animated animate__fadeInRight">
        <button onclick="goBack()" class="text-[#8E8E93] mb-4 text-left">← Назад</button>
        <div id='c' class='flex-1 overflow-y-auto mb-4 space-y-4 pr-2'></div>
        <div class="glass p-2 rounded-3xl flex items-end">
            <textarea id='i' class='flex-1 bg-transparent p-3 focus:outline-none text-sm' rows='2' placeholder="Что на душе?"></textarea>
            <button onclick='sendSOS()' class='bg-white text-black p-3 rounded-2xl'>🚀</button>
        </div>
    </div>

    <div id='chat-screen' style='display:none' class="flex flex-col h-full animate__animated animate__fadeInRight">
        <button onclick="goBack()" class="text-[#8E8E93] mb-4 text-left">← Назад</button>
        <div id='chat-box' class='flex-1 overflow-y-auto mb-4 space-y-3'></div>
        <div class="glass p-2 rounded-3xl flex items-center">
            <input id='chat-input' class='flex-1 bg-transparent p-3 focus:outline-none' placeholder="Сообщение...">
            <button onclick='sendChatMessage()' class='bg-green-500 p-3 rounded-2xl'>📤</button>
        </div>
    </div>

    <div id='p' style='display:none' class="text-center h-full animate__animated animate__zoomIn">
        <button onclick="goBack()" class="text-left text-[#8E8E93] mb-10 block">← Назад</button>
        <div class="relative w-40 h-40 mx-auto mb-10 glass rounded-full flex flex-col items-center justify-center border-2 border-blue-500/30">
            <span class="text-xs text-blue-400 font-bold">ДЕНЬ</span>
            <span id="day-number" class="text-6xl font-black text-[#E0E0E0]">1</span>
        </div>
        <p id="task-text" class="text-lg font-light mb-10 px-6 text-[#E0E0E0]"></p>
        <button id="btn-complete" onclick="completeTask()" class="w-full bg-white text-black p-6 rounded-[2rem] font-bold active:scale-95 transition-all">Я ВЫПОЛНИЛ(А)</button>
    </div>

    <div id='private-chat-screen' style='display:none' class="flex flex-col h-full animate__animated animate__fadeInRight">
        <button onclick="goBack()" class="text-[#8E8E93] mb-4 text-left">← Назад</button>
        
        <div id="private-chat-searching" class="flex flex-col items-center justify-center flex-1 text-center">
            <div class="animate-spin rounded-full h-16 w-16 border-b-2 border-gray-500"></div>
            <p class="mt-4 text-[#8E8E93]">Ищем того, кто тебя поймет...</p>
            <p class="text-xs text-[#8E8E93] mt-2">Это может занять несколько минут.</p>
        </div>

        <div id="private-chat-active" style="display: none;" class="flex flex-col h-full">
            <div class="flex justify-between items-center mb-2">
                <span class="text-xs text-green-400">✅ Собеседник найден!</span>
                <div>
                    <button id="report-btn" onclick="reportPartner()" class="text-xs text-red-500/50 hover:text-red-500">Жалоба</button>
                    <button onclick="goBack()" class="text-xs text-[#8E8E93] hover:text-[#E0E0E0] ml-2">Завершить</button>
                </div>
            </div>
            <div id='private-chat-box' class='flex-1 overflow-y-auto mb-4 space-y-3 pr-2'></div>
            <div class="glass p-2 rounded-3xl flex items-center">
                <input id='private-chat-input' class='flex-1 bg-transparent p-3 focus:outline-none' placeholder="Анонимное сообщение..." onkeypress="handlePrivateChatEnter(event)">
                <button onclick='sendPrivateMessage()' class='bg-blue-500 p-3 rounded-2xl'>➤</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const userId = tg.initDataUnsafe?.user?.id || 123456;
        const userName = tg.initDataUnsafe?.user?.first_name || "Друг";
        let API_URL = "https://felicidad-selfsame-veritably.ngrok-free.dev"; 

        let privateChatSocket = null;
        let partnerId = null;

        async function initApp() {
            document.getElementById('user-name').innerText = userName;
            await checkConnection();
            await updateProgressBar();
        }

        async function checkConnection() {
            try {
                const res = await fetch(`${API_URL}/api/config`);
                if (res.ok) {
                    const dot = document.getElementById('status-dot');
                    dot.classList.replace('bg-red-500', 'bg-green-500');
                    dot.classList.add('pulse');
                    document.getElementById('status-text').innerText = "SafeSpace Active";
                }
            } catch (e) {}
        }

        async function updateProgressBar() {
            try {
                const res = await fetch(`${API_URL}/api/task/${userId}`);
                const data = await res.json();
                
                const day = data.day;
                const percentage = Math.round((day / 21) * 100);
                
                // Обновляем текст и ширину полоски
                document.getElementById('progress-text').innerText = `День ${day} из 21. Ты справляешься`;
                document.getElementById('progress-percent').innerText = `${percentage}%`;
                document.getElementById('progress-fill').style.width = `${percentage}%`;
            } catch (e) {
                console.error("Ошибка прогресс-бара:", e);
            }
        }

        function showScreen(mode) {
            document.getElementById('m').style.display='none';
            if(mode === 'sos') document.getElementById('s').style.display='flex';
            if(mode === 'chat') { document.getElementById('chat-screen').style.display='flex'; loadChat(); setInterval(loadChat, 5000); }
            if(mode === 'path') { document.getElementById('p').style.display='block'; loadTask(); }
            if(mode === 'private_chat') { 
                document.getElementById('private-chat-screen').style.display='flex'; 
                startPrivateChat(); 
            }
        }

        async function loadTask() {
            try {
                if (!API_URL) { // Доп. проверка, если конфиг еще не загрузился
                    console.log("Ожидание загрузки конфига...");
                    return;
                }
                const res = await fetch(`${API_URL}/api/task/${userId}`);
                const data = await res.json();
                document.getElementById('day-number').innerText = data.day;
                document.getElementById('task-text').innerText = data.task;
            } catch (e) { document.getElementById('task-text').innerText = "Ошибка связи с сервером. Проверь Ngrok!"; }
        }

        async function completeTask() {
            const btn = document.getElementById('btn-complete');
            btn.disabled = true;
            btn.innerText = "ОБРАБОТКА...";
            try {
                const res = await fetch(`${API_URL}/api/task/complete/${userId}`, {method: 'POST'});
                if (!res.ok) throw new Error();
                const result = await res.json();
                if(result.status === "success") {
                    await loadTask();
                    await updateProgressBar();
                    tg.HapticFeedback.notificationOccurred('success');
                    alert("Отлично! День пройден.");
                }
            } catch (e) { alert("Ошибка связи с сервером"); }
            btn.disabled = false;
            btn.innerText = "Я ВЫПОЛНИЛ(А)";
        }

        async function sendSOS(){
            let i = document.getElementById('i'), c = document.getElementById('c');
            if(!i.value) return;
            const text = i.value; i.value = '';
            c.innerHTML += `<div class="flex justify-end"><div class="glass p-3 rounded-2xl text-sm">${text}</div></div>`;
            try {
                const res = await fetch(`${API_URL}/api/sos`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: text})
                });
                const data = await res.json();
                c.innerHTML += `<div class="flex justify-start"><div class="bg-blue-900/30 p-3 rounded-2xl text-sm text-blue-200">${data.reply}</div></div>`;
                c.scrollTop = c.scrollHeight;
            } catch (e) {}
        }

        async function loadChat() {
            try {
                const res = await fetch(`${API_URL}/api/messages`);
                const messages = await res.json();
                const box = document.getElementById('chat-box');
                box.innerHTML = messages.map(m => `
                    <div class="flex ${m.user_id == userId ? 'justify-end' : 'justify-start'}">
                        <div class="glass p-3 rounded-2xl text-sm border ${m.user_id == userId ? 'border-green-500/20' : 'border-white/10'}">
                            <div class="text-[10px] opacity-50 mb-1">${m.time}</div>
                            ${m.text}
                        </div>
                    </div>
                `).join('');
            } catch (e) {}
        }

        async function sendChatMessage() {
            const input = document.getElementById('chat-input');
            if(!input.value) return;
            const text = input.value; input.value = '';
            try {
                await fetch(`${API_URL}/api/messages/send`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({user_id: userId, text: text})
                });
                loadChat();
            } catch (e) {}
        }

        function goBack() {
            // Если был открыт сокет анонимного чата, закрываем его
            if (privateChatSocket) {
                privateChatSocket.close();
                privateChatSocket = null;
            }

            // Скрываем все экраны и показываем главный
            document.querySelectorAll('body > div').forEach(div => {
                if(div.id) div.style.display = 'none';
            });
            const mainScreen = document.getElementById('m');
            mainScreen.style.display = 'block';
            // Возвращаем анимацию для главного экрана
            mainScreen.classList.remove('animate__fadeIn');
            void mainScreen.offsetWidth; // трюк для перезапуска анимации
            mainScreen.classList.add('animate__fadeIn');
        }

        window.onload = loadConfig;

        // --- ЛОГИКА ПРИВАТНОГО ЧАТА ---

        function startPrivateChat() {
            if (privateChatSocket) return;

            document.getElementById('private-chat-searching').style.display = 'flex';
            document.getElementById('private-chat-active').style.display = 'none';
            document.getElementById('private-chat-box').innerHTML = '';
            document.getElementById('private-chat-input').disabled = false;
            document.getElementById('report-btn').style.display = 'inline';

            const wsUrl = API_URL.replace('https', 'wss').replace('http', 'ws');
            privateChatSocket = new WebSocket(`${wsUrl}/ws/chat/${userId}`);

            privateChatSocket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                const chatBox = document.getElementById('private-chat-box');

                switch(data.type) {
                    case 'waiting':
                        console.log(data.text);
                        break;
                    case 'match':
                        partnerId = data.partner_id;
                        tg.HapticFeedback.notificationOccurred('success');
                        document.getElementById('private-chat-searching').style.display = 'none';
                        document.getElementById('private-chat-active').style.display = 'flex';
                        chatBox.innerHTML += `<div class="text-center text-xs text-green-500 my-2">Вы в анонимном чате. История не сохраняется.</div>`;
                        break;
                    case 'message':
                        tg.HapticFeedback.impactOccurred('light');
                        chatBox.innerHTML += `<div class="flex justify-start"><div class="bg-gray-700 p-3 rounded-2xl text-sm">${data.text}</div></div>`;
                        chatBox.scrollTop = chatBox.scrollHeight;
                        break;
                    case 'sys_message':
                        if (data.text.includes("покинул чат")) {
                            chatBox.innerHTML += `<div class="text-center text-xs text-red-500 my-2">${data.text}</div>`;
                            document.getElementById('private-chat-input').disabled = true;
                            partnerId = null;
                        } else {
                            alert(data.text);
                        }
                        break;
                }
            };

            privateChatSocket.onclose = () => {
                if (partnerId) { // Если мы были в активном чате
                     document.getElementById('private-chat-box').innerHTML += `<div class="text-center text-xs text-red-500 my-2">Соединение разорвано.</div>`;
                }
                document.getElementById('private-chat-input').disabled = true;
                privateChatSocket = null;
                partnerId = null;
            };

            privateChatSocket.onerror = (error) => {
                console.error("WebSocket Error:", error);
                alert("Ошибка подключения к чату. Попробуйте вернуться на главный экран и снова зайти.");
                goBack();
            };
        }

        function sendPrivateMessage() {
            const input = document.getElementById('private-chat-input');
            if (!input.value || !privateChatSocket || privateChatSocket.readyState !== WebSocket.OPEN) return;
            const text = input.value;
            if (text.includes('<') || text.includes('>') || /http/i.test(text)) {
                alert("Ссылки и HTML-теги запрещены.");
                return;
            }
            privateChatSocket.send(JSON.stringify({type: 'message', text: text}));
            const chatBox = document.getElementById('private-chat-box');
            chatBox.innerHTML += `<div class="flex justify-end"><div class="bg-blue-600 p-3 rounded-2xl text-sm">${text}</div></div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
            input.value = '';
        }

        function handlePrivateChatEnter(event) {
            if (event.key === 'Enter') { event.preventDefault(); sendPrivateMessage(); }
        }

        async function reportPartner() {
            if (!partnerId) { alert("Некого репортить. Собеседник уже отключился."); return; }
            if (confirm(`Вы уверены, что хотите пожаловаться на собеседника? Это действие необратимо.`)) {
                await fetch(`${API_URL}/api/chat/report/${userId}/${partnerId}`, { method: 'POST' });
                alert("Жалоба отправлена администратору. Спасибо.");
                tg.HapticFeedback.notificationOccurred('warning');
                document.getElementById('report-btn').style.display = 'none';
            }
        }
    </script>
</body>
</html>
