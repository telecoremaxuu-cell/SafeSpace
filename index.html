<!DOCTYPE html>
<html lang='ru'>
<head>
    <meta charset='UTF-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='https://cdn.tailwindcss.com'></script>
</head>
<body class='p-6 bg-[#121212] text-white font-sans'>
    
    <div id='m'>
        <h1 id="user-name" class='text-center text-gray-500 italic mb-10 mt-10 text-xl'>SafeSpace</h1>
        <div class="space-y-4">
            <button onclick='showScreen("sos")' class='w-full bg-[#704241] p-6 rounded-3xl font-bold shadow-lg active:scale-95 transition-transform text-left flex justify-between items-center'>
                <span>SOS: Выплеснуть всё</span>
                <span>→</span>
            </button>
            <button onclick='showScreen("chat")' class='w-full bg-[#4A6741] p-6 rounded-3xl font-bold shadow-lg active:scale-95 transition-transform text-left flex justify-between items-center'>
                <span>Общий чат (Анонимно)</span>
                <span>→</span>
            </button>
            <button onclick='showScreen("path")' class='w-full bg-[#5F7D8E] p-6 rounded-3xl font-bold shadow-lg active:scale-95 transition-transform text-left flex justify-between items-center'>
                <span>Путь 21 дня</span>
                <span>→</span>
            </button>
        </div>
        <p id="status-dot" class="text-center text-[10px] text-red-500 mt-10 uppercase tracking-widest">● Поиск бэкенда...</p>
    </div>

    <div id='s' style='display:none' class="flex flex-col h-[90vh]">
        <button onclick="location.reload()" class="text-gray-500 mb-4 text-sm w-fit">← Назад</button>
        <div id='c' class='flex-1 overflow-y-auto bg-gray-900/50 p-4 rounded-xl mb-4 text-sm border border-gray-800 shadow-inner space-y-2'></div>
        <textarea id='i' class='w-full bg-gray-800 p-4 rounded-xl mb-2 focus:outline-none focus:ring-2 focus:ring-gray-600 text-white' rows='3' placeholder="Пиши всё..."></textarea>
        <button onclick='sendSOS()' class='w-full bg-blue-600 p-4 rounded-xl font-bold active:scale-95 transition-all'>Отправить</button>
    </div>

    <div id='chat-screen' style='display:none' class="flex flex-col h-[90vh]">
        <button onclick="location.reload()" class="text-gray-500 mb-4 text-sm w-fit">← Назад</button>
        <div id='chat-box' class='flex-1 overflow-y-auto bg-gray-900/50 p-4 rounded-xl mb-4 text-sm border border-gray-800 shadow-inner space-y-3'></div>
        <div class="flex space-x-2">
            <input id='chat-input' class='flex-1 bg-gray-800 p-4 rounded-xl focus:outline-none text-white' placeholder="Написать всем...">
            <button onclick='sendChatMessage()' class='bg-green-600 px-6 rounded-xl font-bold active:scale-95 transition-all'>📤</button>
        </div>
    </div>

    <div id='p' style='display:none' class="text-center">
        <button onclick="location.reload()" class="text-gray-500 mb-10 text-sm block">← Назад</button>
        <div class="bg-gray-800 p-10 rounded-full w-40 h-40 mx-auto mb-6 flex items-center justify-center border-4 border-[#5F7D8E]">
            <span id="day-num" class="text-5xl font-black">1</span>
        </div>
        <p id="task-text" class="text-gray-300 mb-10 italic">Загрузка задания...</p>
        <button onclick="completeTask()" class="w-full bg-[#5F7D8E] p-6 rounded-2xl font-bold">Я ВЫПОЛНИЛ(А)</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const user = tg.initDataUnsafe?.user;
        const userId = user ? user.id : 123456;
        const userName = user ? user.first_name : "Друг";

        let API_URL = "https://felicidad-selfsame-veritably.ngrok-free.dev"; 
        let chatInterval;

        async function initApp() {
            document.getElementById('user-name').innerText = `Привет, ${userName}`;
            await checkConnection();
            checkUser();
        }

        async function checkConnection() {
            try {
                const res = await fetch(`${API_URL}/api/config`);
                if (res.ok) {
                    const dot = document.getElementById('status-dot');
                    dot.innerText = "● SafeSpace Online";
                    dot.classList.replace('text-red-500', 'text-green-500');
                }
            } catch (err) {
                document.getElementById('status-dot').innerText = "● Ошибка связи";
            }
        }

        function showScreen(mode) {
            document.getElementById('m').style.display='none';
            if(mode === 'sos') {
                document.getElementById('s').style.display='flex';
            } else if(mode === 'path') {
                document.getElementById('p').style.display='block';
                loadTask();
            } else if(mode === 'chat') {
                document.getElementById('chat-screen').style.display='flex';
                loadChat();
                chatInterval = setInterval(loadChat, 5000); // Обновляем чат каждые 5 секунд
            }
        }

        async function checkUser() {
            try { await fetch(`${API_URL}/api/user/${userId}`); } catch (e) {}
        }

        // --- ЛОГИКА SOS ---
        async function sendSOS(){
            let i = document.getElementById('i'), c = document.getElementById('c');
            if(!i.value) return;
            let text = i.value;
            c.innerHTML += `<div class="text-right"><span class="bg-blue-900/30 p-2 rounded-lg inline-block border border-blue-800/50">${text}</span></div>`;
            i.value = '';
            c.scrollTop = c.scrollHeight;
            try {
                const response = await fetch(`${API_URL}/api/sos`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: text})
                });
                const data = await response.json();
                setTimeout(() => {
                    c.innerHTML += `<div class="text-left"><span class="bg-gray-800 p-2 rounded-lg inline-block text-blue-300 border border-gray-700">${data.reply}</span></div>`;
                    c.scrollTop = c.scrollHeight;
                }, 800);
            } catch (err) {}
        }

        // --- ЛОГИКА ОБЩЕГО ЧАТА ---
        async function loadChat() {
            try {
                const res = await fetch(`${API_URL}/api/messages`);
                const messages = await res.json();
                const chatBox = document.getElementById('chat-box');
                chatBox.innerHTML = messages.map(m => `
                    <div class="${m.user_id == userId ? 'text-right' : 'text-left'}">
                        <div class="text-[10px] text-gray-500 mb-1">${m.time}</div>
                        <span class="${m.user_id == userId ? 'bg-green-900/30 border-green-800/50' : 'bg-gray-800 border-gray-700'} p-2 rounded-lg inline-block border">
                            ${m.text}
                        </span>
                    </div>
                `).join('');
            } catch (e) {}
        }

        async function sendChatMessage() {
            const input = document.getElementById('chat-input');
            if (!input.value) return;
            const text = input.value;
            input.value = '';
            try {
                await fetch(`${API_URL}/api/messages/send`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({user_id: userId, text: text})
                });
                loadChat();
            } catch (e) {}
        }

        // --- ЛОГИКА ПУТИ ---
        async function loadTask() {
            try {
                const res = await fetch(`${API_URL}/api/task/${userId}`);
                const data = await res.json();
                document.getElementById('day-num').innerText = data.day;
                document.getElementById('task-text').innerText = data.task;
            } catch (e) { document.getElementById('task-text').innerText = "Ошибка загрузки"; }
        }

        async function completeTask() {
            try {
                await fetch(`${API_URL}/api/task/complete/${userId}`, {method: 'POST'});
                loadTask(); 
            } catch (e) {}
        }

        initApp();
    </script>
</body>
</html>
