<!DOCTYPE html>
<html lang='ru'>
<head>
    <meta charset='UTF-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='https://cdn.tailwindcss.com'></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { background: radial-gradient(circle at top, #1e1e2e, #111111); overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .pulse { animation: pulse-green 2s infinite; }
        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body class='p-5 text-white font-sans h-screen flex flex-col'>
    
    <div id='m' class="animate__animated animate__fadeIn">
        <div class="flex flex-col items-center mb-10 mt-5">
            <h1 id="user-name" class='text-2xl font-light tracking-widest text-gray-400'>SAFESPACE</h1>
            <div id="status-container" class="flex items-center mt-2 space-x-2">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-red-500"></div>
                <span id="status-text" class="text-[10px] uppercase tracking-tighter text-gray-500 font-bold">Offline</span>
            </div>
        </div>

        <div class="space-y-5">
            <button onclick='showScreen("sos")' class='w-full glass p-6 rounded-[2rem] font-medium shadow-2xl active:scale-95 transition-all flex justify-between items-center group'>
                <div class="flex items-center space-x-4">
                    <span class="text-2xl">🔥</span>
                    <span class="text-lg">SOS: Выплеснуть</span>
                </div>
                <span class="text-gray-500 group-hover:translate-x-1 transition-transform">→</span>
            </button>
            <button onclick='showScreen("chat")' class='w-full glass p-6 rounded-[2rem] font-medium shadow-2xl active:scale-95 transition-all flex justify-between items-center group'>
                <div class="flex items-center space-x-4">
                    <span class="text-2xl">💬</span>
                    <span class="text-lg">Общий чат</span>
                </div>
                <span class="text-gray-500 group-hover:translate-x-1 transition-transform">→</span>
            </button>
            <button onclick='showScreen("path")' class='w-full glass p-6 rounded-[2rem] font-medium shadow-2xl active:scale-95 transition-all flex justify-between items-center group'>
                <div class="flex items-center space-x-4">
                    <span class="text-2xl">🏔️</span>
                    <span class="text-lg">Путь 21 дня</span>
                </div>
                <span class="text-gray-500 group-hover:translate-x-1 transition-transform">→</span>
            </button>
        </div>
    </div>

    <div id='s' style='display:none' class="flex flex-col h-full animate__animated animate__fadeInRight">
        <button onclick="location.reload()" class="text-gray-500 mb-4 flex items-center">← Назад</button>
        <div id='c' class='flex-1 overflow-y-auto mb-4 space-y-4 pr-2'></div>
        <div class="glass p-2 rounded-3xl flex items-end space-x-2">
            <textarea id='i' class='flex-1 bg-transparent p-3 focus:outline-none text-sm resize-none' rows='2' placeholder="Что тебя беспокоит?"></textarea>
            <button onclick='sendSOS()' class='bg-white text-black p-3 rounded-2xl font-bold active:scale-90 transition-all'>🚀</button>
        </div>
    </div>

    <div id='chat-screen' style='display:none' class="flex flex-col h-full animate__animated animate__fadeInRight">
        <button onclick="location.reload()" class="text-gray-500 mb-4 flex items-center">← Назад</button>
        <div id='chat-box' class='flex-1 overflow-y-auto mb-4 space-y-3 pr-2'></div>
        <div class="glass p-2 rounded-3xl flex items-center space-x-2">
            <input id='chat-input' class='flex-1 bg-transparent p-3 focus:outline-none text-sm' placeholder="Написать всем...">
            <button onclick='sendChatMessage()' class='bg-green-500 p-3 rounded-2xl font-bold active:scale-90 transition-all'>📤</button>
        </div>
    </div>

    <div id='p' style='display:none' class="text-center h-full animate__animated animate__zoomIn">
        <button onclick="location.reload()" class="text-left text-gray-500 mb-10 block">← Назад</button>
        <div class="relative w-48 h-48 mx-auto mb-10">
            <div class="absolute inset-0 bg-blue-500/20 blur-3xl rounded-full"></div>
            <div class="relative glass rounded-full w-full h-full flex flex-col items-center justify-center border-2 border-blue-500/30">
                <span class="text-xs uppercase text-blue-400 font-bold tracking-widest">День</span>
                <span id="day-num" class="text-7xl font-black">1</span>
            </div>
        </div>
        <p id="task-text" class="text-xl font-light leading-relaxed mb-10 px-4"></p>
        <button onclick="completeTask()" class="w-full bg-white text-black p-6 rounded-[2rem] font-bold shadow-xl active:scale-95 transition-all">Я ВЫПОЛНИЛ(А)</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.backgroundColor = '#111111';
        tg.headerColor = '#111111';

        const userId = tg.initDataUnsafe?.user?.id || 123456;
        const userName = tg.initDataUnsafe?.user?.first_name || "Друг";
        let API_URL = "https://felicidad-selfsame-veritably.ngrok-free.dev"; 

        async function initApp() {
            document.getElementById('user-name').innerText = userName.toUpperCase();
            await checkConnection();
            checkUser();
        }

        async function checkConnection() {
            try {
                const res = await fetch(`${API_URL}/api/config`);
                if (res.ok) {
                    const dot = document.getElementById('status-dot');
                    dot.classList.replace('bg-red-500', 'bg-green-500');
                    dot.classList.add('pulse');
                    document.getElementById('status-text').innerText = "SafeSpace Active";
                    document.getElementById('status-text').classList.replace('text-gray-500', 'text-green-500');
                }
            } catch (err) {
                document.getElementById('status-text').innerText = "Connection Error";
            }
        }

        function showScreen(mode) {
            document.getElementById('m').style.display='none';
            if(mode === 'sos') {
                document.getElementById('s').style.display='flex';
            } else if(mode === 'path') {
                document.getElementById('p').style.display='block';
                loadTask();
            } else if(mode === 'chat') {
                document.getElementById('chat-screen').style.display='flex';
                loadChat();
                setInterval(loadChat, 5000);
            }
        }

        async function checkUser() { try { await fetch(`${API_URL}/api/user/${userId}`); } catch (e) {} }

        async function sendSOS(){
            let i = document.getElementById('i'), c = document.getElementById('c');
            if(!i.value) return;
            let text = i.value;
            c.innerHTML += `<div class="flex justify-end animate__animated animate__fadeInUp"><div class="glass p-3 rounded-2xl max-w-[80%] text-sm">${text}</div></div>`;
            i.value = '';
            c.scrollTop = c.scrollHeight;
            try {
                const res = await fetch(`${API_URL}/api/sos`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: text})
                });
                const data = await res.json();
                setTimeout(() => {
                    c.innerHTML += `<div class="flex justify-start animate__animated animate__fadeInUp"><div class="bg-white/10 p-3 rounded-2xl max-w-[80%] text-sm text-blue-300 border border-blue-500/20">${data.reply}</div></div>`;
                    c.scrollTop = c.scrollHeight;
                }, 600);
            } catch (e) {}
        }

        async function loadChat() {
            try {
                const res = await fetch(`${API_URL}/api/messages`);
                const messages = await res.json();
                const chatBox = document.getElementById('chat-box');
                const isBottom = chatBox.scrollHeight - chatBox.scrollTop <= chatBox.clientHeight + 100;
                chatBox.innerHTML = messages.map(m => `
                    <div class="flex ${m.user_id == userId ? 'justify-end' : 'justify-start'} animate__animated animate__fadeIn">
                        <div class="${m.user_id == userId ? 'glass border-green-500/30' : 'bg-white/5 border-white/10'} p-3 rounded-2xl max-w-[85%] border">
                            <div class="text-[9px] text-gray-500 mb-1">${m.time}</div>
                            <div class="text-sm">${m.text}</div>
                        </div>
                    </div>
                `).join('');
                if(isBottom) chatBox.scrollTop = chatBox.scrollHeight;
            } catch (e) {}
        }

        async function sendChatMessage() {
            const input = document.getElementById('chat-input');
            if (!input.value) return;
            const text = input.value; input.value = '';
            try {
                await fetch(`${API_URL}/api/messages/send`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({user_id: userId, text: text})
                });
                loadChat();
            } catch (e) {}
        }

        async function loadTask() {
            try {
                const res = await fetch(`${API_URL}/api/task/${userId}`);
                const data = await res.json();
                document.getElementById('day-num').innerText = data.day;
                document.getElementById('task-text').innerText = data.task;
            } catch (e) {}
        }

        async function completeTask() {
            try {
                await fetch(`${API_URL}/api/task/complete/${userId}`, {method: 'POST'});
                loadTask(); 
            } catch (e) {}
        }

        initApp();
    </script>
</body>
</html>
